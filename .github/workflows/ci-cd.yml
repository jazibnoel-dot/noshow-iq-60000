name: CI/CD Pipeline
on:
  push:
    branches: [main]
jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install flake8 pytest httpx -r requirements.txt
          pip install -e .
      - name: Step 1 - Lint with flake8
        run: flake8 noshow_iq/ tests/ --max-line-length=100
      - name: Step 2 - Run pytest
        run: pytest -v
      - name: Step 3 - Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/noshow-iq .
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Step 4 - Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/noshow-iq
      - name: Step 5 - Trigger Hugging Face rebuild
        run: |
          curl -X POST \
            "https://huggingface.co/api/spaces/${{ secrets.HF_USERNAME }}/noshow-iq/restart" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}"