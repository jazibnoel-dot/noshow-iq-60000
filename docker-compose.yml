services:
  app:
    build: .
    ports:
      - "7860:7860"
    environment:
      - MONGO_URI=mongodb://mongo:27017
        DATASET_PATH=data/raw/KaggleV2-May-2016.csv
    depends_on:
      - mongo
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
  mongo-express:
    image: mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_BASICAUTH=false
volumes:
  mongo_data: